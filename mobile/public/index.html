<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>AI-DOCS</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; min-height: 100%;
        background: #0f172a; color: #e2e8f0;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .wrap {
        min-height: 100vh; box-sizing: border-box;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 16px; padding: 24px; text-align: center;
      }
      .logo { width: 64px; height: 64px; border-radius: 16px; background: #0ea5e9; }
      h1 { font-size: 20px; margin: 4px 0 0; }
      p { color: #94a3b8; font-size: 14px; margin: 0; max-width: 320px; }
      .card { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 12px; }
      input {
        width: 100%; box-sizing: border-box; padding: 12px 14px; font-size: 16px;
        border: 1px solid #334155; border-radius: 10px; background: #1e293b; color: #e2e8f0;
      }
      button {
        padding: 12px 16px; font-size: 15px; border: 0; border-radius: 10px;
        background: #0ea5e9; color: #fff; font-weight: 600;
      }
      button.secondary { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; }
      .err { color: #f87171; font-size: 13px; min-height: 16px; }
      .hidden { display: none; }
      /* QR scan: camera renders behind the WebView → make page transparent and
         show only the viewfinder + cancel. */
      html.qr-scanning, html.qr-scanning body { background: transparent !important; }
      html.qr-scanning body > *:not(.qr-overlay) { visibility: hidden !important; }
      .qr-overlay {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
      }
      .qr-frame {
        width: 70vw; max-width: 280px; aspect-ratio: 1 / 1;
        border: 3px solid rgba(255,255,255,0.9); border-radius: 20px;
        box-shadow: 0 0 0 100vmax rgba(0,0,0,0.45);
      }
      .qr-cancel {
        padding: 12px 28px; border: 0; border-radius: 10px;
        background: rgba(15,23,42,0.85); color: #fff; font-size: 15px; font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo"></div>
      <h1>AI-DOCS</h1>

      <!-- Connecting state (a server is already configured) -->
      <div id="connecting" class="hidden">
        <p>Подключение к серверу…</p>
      </div>

      <!-- Unreachable state -->
      <div id="unreachable" class="card hidden">
        <p>Сервер недоступен. Проверьте интернет и адрес.</p>
        <button id="retry">Повторить</button>
        <button id="proceed" class="secondary">Продолжить всё равно</button>
        <button id="change" class="secondary">Сменить сервер</button>
      </div>

      <!-- Setup state (no server yet) -->
      <div id="setup" class="card hidden">
        <p>Укажите адрес сервера AI-DOCS — введите вручную или отсканируйте QR-код со страницы установки.</p>
        <input id="url" type="url" inputmode="url" placeholder="https://server.example.com" autocomplete="off" />
        <div class="err" id="err"></div>
        <button id="connect">Подключиться</button>
        <button id="scan" class="secondary">Сканировать QR-код</button>
      </div>
    </div>

    <script>
      // Bundled launcher. The app is NOT tied to any server: on first launch the
      // user provides the URL (typed or scanned). It is saved by the ServerConfig
      // plugin; the WebView then loads that live site (allowNavigation: ["*"]).
      (function () {
        var Plugins = (window.Capacitor && window.Capacitor.Plugins) || {};
        var ServerConfig = Plugins.ServerConfig;
        var BarcodeScanner = Plugins.BarcodeScanner;

        var $ = function (id) { return document.getElementById(id); };
        function show(id) { $(id).classList.remove("hidden"); }
        function hide(id) { $(id).classList.add("hidden"); }

        function go(url) {
          show("connecting");
          hide("setup");
          window.location.replace(url);
        }

        // Probe the server before navigating, so an unreachable server lands on a
        // friendly retry/change screen instead of a raw WebView error page.
        async function connect(url) {
          hide("setup");
          hide("unreachable");
          show("connecting");
          var ok = false;
          try {
            var ctrl = new AbortController();
            var to = setTimeout(function () { ctrl.abort(); }, 6000);
            // no-cors: this is a cross-origin reachability probe from the bundled
            // launcher origin. Without no-cors the browser blocks reading the
            // response and fetch throws even though the server is up (false
            // "unreachable"). We don't read the body — resolving is enough.
            await fetch(url + "/health", {
              method: "GET",
              mode: "no-cors",
              cache: "no-store",
              signal: ctrl.signal,
            });
            clearTimeout(to);
            ok = true; // request completed → server reachable
          } catch (e) {
            ok = false;
          }
          if (ok) {
            window.location.replace(url);
          } else {
            hide("connecting");
            show("unreachable");
            $("retry").onclick = function () { connect(url); };
            // Safety valve: the probe can still misfire on odd networks — let the
            // user open the site anyway (the WebView shows its own error if down).
            $("proceed").onclick = function () { window.location.replace(url); };
          }
        }

        function looksLikeUrl(v) {
          // Require https (http only for local dev hosts); ServerConfig also enforces this.
          if (/^http:\/\//i.test(v)) {
            return /^http:\/\/(localhost|127\.0\.0\.1|10\.0\.2\.2)([:/]|$)/i.test(v);
          }
          return /^https:\/\/[^\s]+/i.test(v) || /^[a-z0-9.-]+\.[a-z]{2,}([/:].*)?$/i.test(v);
        }

        async function save(url) {
          if (ServerConfig && ServerConfig.set) {
            var res = await ServerConfig.set({ url: url });
            return (res && res.url) || url;
          }
          return url;
        }

        function setupScreen() {
          show("setup");
          hide("connecting");
          hide("unreachable");
          if (!BarcodeScanner) hide("scan");
        }

        async function init() {
          // "Change server" returns to setup without a saved URL.
          $("change").onclick = async function () {
            try { if (ServerConfig && ServerConfig.clear) await ServerConfig.clear(); } catch (e) {}
            setupScreen();
          };

          // Already configured? Probe, then go to the live site.
          if (ServerConfig && ServerConfig.get) {
            try {
              var res = await ServerConfig.get();
              if (res && res.url) return connect(res.url);
            } catch (e) {}
          }

          setupScreen();

          $("connect").addEventListener("click", async function () {
            var v = ($("url").value || "").trim();
            if (!looksLikeUrl(v)) {
              $("err").textContent = "Введите корректный https-адрес сервера.";
              return;
            }
            try {
              await connect(await save(v));
            } catch (e) {
              $("err").textContent = (e && e.message) || "Не удалось сохранить адрес.";
            }
          });

          $("scan").addEventListener("click", async function () {
            $("err").textContent = "";
            try {
              var code = await scanQr();
              if (!code) { $("err").textContent = "QR-код не распознан."; return; }
              // Login QR (/auth/qr-redeem?t=…): configure the server to its origin
              // AND sign in immediately — go straight into the app, never showing
              // the login page. Any other QR is treated as a server address.
              try {
                var u = new URL(code);
                if (u.pathname.indexOf("/auth/qr-redeem") === 0 && u.searchParams.get("t")) {
                  await save(u.origin);          // persist server = origin
                  window.location.replace(code); // → redeem → /inbox (logged in)
                  return;
                }
              } catch (e) {}
              await connect(await save(code));
            } catch (e) {
              $("err").textContent = (e && e.message) || "Не удалось отсканировать.";
            }
          });
        }

        // GMS-free QR scan: startScan() uses CameraX + the BUNDLED ML Kit model.
        // scan() relies on the Google Code Scanner module (Play Services
        // ModuleInstall) which fails on GMS-less devices (HONOR/Huawei: error 17).
        async function scanQr() {
          if (!BarcodeScanner) return null;
          if (!BarcodeScanner.startScan) {
            // Old fallback (GMS devices only).
            if (BarcodeScanner.scan) {
              var r = await BarcodeScanner.scan();
              return (r && r.barcodes && r.barcodes[0] && r.barcodes[0].rawValue) || null;
            }
            return null;
          }
          try {
            var perm = BarcodeScanner.requestPermissions
              ? await BarcodeScanner.requestPermissions()
              : null;
            if (perm && perm.camera && perm.camera !== "granted" && perm.camera !== "limited") {
              return null;
            }
          } catch (e) {}

          return await new Promise(function (resolve) {
            var settled = false;
            var overlay = document.createElement("div");
            overlay.className = "qr-overlay";
            overlay.innerHTML =
              '<div class="qr-frame"></div><button type="button" class="qr-cancel">Отмена</button>';
            function finish(val) {
              if (settled) return;
              settled = true;
              try { BarcodeScanner.removeAllListeners && BarcodeScanner.removeAllListeners(); } catch (e) {}
              try { BarcodeScanner.stopScan && BarcodeScanner.stopScan(); } catch (e) {}
              document.documentElement.classList.remove("qr-scanning");
              if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
              resolve(val);
            }
            overlay.querySelector(".qr-cancel").addEventListener("click", function () { finish(null); });
            document.documentElement.classList.add("qr-scanning");
            document.body.appendChild(overlay);
            try {
              BarcodeScanner.addListener("barcodeScanned", function (ev) {
                var code = (ev && ev.barcode && ev.barcode.rawValue) ||
                           (ev && ev.barcodes && ev.barcodes[0] && ev.barcodes[0].rawValue);
                if (code) finish(code);
              });
            } catch (e) {}
            Promise.resolve(BarcodeScanner.startScan()).catch(function () { finish(null); });
            setTimeout(function () { finish(null); }, 60000);
          });
        }

        document.addEventListener("DOMContentLoaded", init);
      })();
    </script>
  </body>
</html>
