routes:
  invoice_ocr:
    required_modalities: ["vision"]
    local_only: true
    fallback_chain: ["gemma4_e4b_ollama", "qwen3_5_9b_ollama"]
    manual_review_fallback: true
    min_quality_score: 0.0
  structured_extraction:
    required_modalities: ["text"]
    local_only: true
    fallback_chain: ["gemma4_e4b_ollama", "qwen3_5_9b_ollama"]
    manual_review_fallback: true
  drawing_analysis:
    required_modalities: ["vision"]
    local_only: true
    fallback_chain: ["gemma4_e4b_ollama", "qwen3_5_9b_ollama"]
    manual_review_fallback: true
  drawing_analysis_vlm:
    required_modalities: ["vision"]
    local_only: true
    fallback_chain:
      # Core multimodal set first (installed); heavy dedicated VLMs are disabled
      # in the catalog and can be re-enabled per deployment for max quality.
      - "qwen3_6_35b_apex_ollama"
      - "gemma4_e4b_ollama"
      - "qwen3_5_9b_ollama"
      - "qwen3_vl_32b_ollama"
      - "claude_sonnet_anthropic"
    manual_review_fallback: true
  cad_spec_read:
    required_modalities: ["vision"]
    local_only: true
    fallback_chain:
      - "qwen3_6_35b_apex_ollama"
      - "gemma4_e4b_ollama"
    manual_review_fallback: true
    notes: >
      Drawing-to-specification reader for the description method. It is not an
      authoritative geometry source: deterministic verification and two-person
      certification remain mandatory. Qwen3-VL is deliberately excluded after
      failing the real-drawing digitization evaluation.
  cad_drawing_graph_read:
    required_modalities: ["vision"]
    local_only: true
    fallback_chain:
      - "qwen3_6_35b_ollama"
      - "qwen3_5_9b_ollama"
    manual_review_fallback: true
    notes: >
      Experimental full-sheet coordinate graph reader. The assigned model is
      only a stage coordinator and cannot certify geometry. Its output must
      validate as EngineeringDrawingGraph and pass independent completeness,
      topology, dimension and pixel-evidence gates before redrawing.
  cad_drawing_graph_layout:
    required_modalities: ["vision"]
    local_only: true
    fallback_chain:
