providers:
  ollama:
    base_url: "http://localhost:11434"
    timeout_seconds: 180
    is_local: true
  llamacpp:
    base_url: "http://localhost:11436"
    timeout_seconds: 300
    is_local: true
    notes: "llama.cpp server — OpenAI-compatible API. Start with: docker compose --profile embedded-llamacpp up"
  vllm:
    base_url: "http://localhost:8000"
    timeout_seconds: 180
    is_local: true
  openai_compatible:
    base_url: "http://localhost:8080"
    timeout_seconds: 180
    is_local: true
  cloud_provider:
    base_url: "https://api.example.invalid"
    api_key_env: "CLOUD_AI_API_KEY"
    timeout_seconds: 180
    is_local: false
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    timeout_seconds: 180
    is_local: false
  anthropic:
    base_url: "https://api.anthropic.com"
    api_key_env: "ANTHROPIC_API_KEY"
    timeout_seconds: 180
    is_local: false
  deepseek:
    base_url: "https://api.deepseek.com/v1"
    api_key_env: "DEEPSEEK_API_KEY"
    timeout_seconds: 180
    is_local: false
  gemini:
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai"
    api_key_env: "GOOGLE_API_KEY"
    timeout_seconds: 180
    is_local: false

models:
  gemma4_e2b_ollama:
    provider: "ollama"
    provider_model: "gemma4:e2b"
    status: "production"
    modalities: ["text", "vision", "audio"]
    max_context_tokens: 128000
    supports_structured_output: false
    supports_tool_calling: false
    local_only: true
    vram_gb_estimate: 3.5
    quality_score: 0.65
    speed_score: 0.95
    notes: "Compact 2B multimodal model (7.2 GB). Fast vision OCR; use when VRAM is constrained."
  gemma4_e4b_ollama:
    provider: "ollama"
    provider_model: "gemma4:e4b"
    status: "production"
    modalities: ["text", "vision", "audio"]
    max_context_tokens: 128000
    supports_structured_output: false
    supports_tool_calling: false
    local_only: true
    vram_gb_estimate: 9.6
    quality_score: 0.72
    speed_score: 0.85
    notes: "Baseline local fast multimodal model for OCR, classification, and extraction."
  gemma4_26b_ollama:
    provider: "ollama"
    provider_model: "gemma4:26b"
    status: "production"
    modalities: ["text", "vision", "tool_calling"]
    max_context_tokens: 256000
    supports_structured_output: false
    supports_tool_calling: true
    local_only: true
    vram_gb_estimate: 18.0
    quality_score: 0.86
    speed_score: 0.55
    notes: "Baseline local reasoning model. Replace through registry when better local models pass evals."
  # ── vLLM models (RTX 3090 24 GB compatible) ─────────────────────────────────
  qwen25_14b_awq_vllm:
    provider: "vllm"
    provider_model: "Qwen/Qwen2.5-14B-Instruct-AWQ"
    status: "staging"
    modalities: ["text", "tool_calling"]
    max_context_tokens: 131072
    supports_structured_output: true
    supports_tool_calling: true
    local_only: true
    vram_gb_estimate: 8.2
    quality_score: 0.88
    speed_score: 0.70
    notes: "Qwen2.5 14B AWQ quantized. ~8.2 GB VRAM on RTX 3090. Long context 131K. Excellent Russian + structured output."
  qwen25_7b_awq_vllm:
    provider: "vllm"
    provider_model: "Qwen/Qwen2.5-7B-Instruct-AWQ"
    status: "staging"
    modalities: ["text", "tool_calling"]
    max_context_tokens: 131072
    supports_structured_output: true
    supports_tool_calling: true
    local_only: true
    vram_gb_estimate: 4.5
    quality_score: 0.80
    speed_score: 0.88
    notes: "Qwen2.5 7B AWQ. ~4.5 GB VRAM. Fast inference, leaves headroom to co-run with Ollama models."
  qwen25_vl_7b_awq_vllm:
    provider: "vllm"
    provider_model: "Qwen/Qwen2.5-VL-7B-Instruct-AWQ"
    status: "staging"
    modalities: ["text", "vision"]
    max_context_tokens: 32768
    supports_structured_output: true
    supports_tool_calling: false
    local_only: true
    vram_gb_estimate: 5.0
    quality_score: 0.82
    speed_score: 0.80
    notes: "Qwen2.5-VL 7B AWQ. Vision language model. ~5 GB VRAM. Good for technical drawing analysis via vLLM."
  llamacpp_active:
    provider: "llamacpp"
    provider_model: "local"
    status: "candidate"
    # vision is available when the loaded GGUF ships an mmproj projector
    # (llama-server auto-detects it); leave it selectable for OCR/vision slots.
    modalities: ["text", "vision"]
    max_context_tokens: 8192
    supports_structured_output: false
    supports_tool_calling: false
    local_only: true
    vram_gb_estimate: 0.0
    quality_score: 0.0
    speed_score: 0.0
    notes: "Active llama.cpp model (GGUF). Model path and context size configured via llamacpp settings. Vision works only if the GGUF has an mmproj. Enable after loading a GGUF model."

  local_embedding_ollama:
    provider: "ollama"
    provider_model: "nomic-embed-text"
    status: "production"
    modalities: ["embedding"]
    max_context_tokens: 8192
    embedding_dimension: 768
    distance_metric: "cosine"
    normalize_embeddings: true
    max_input_tokens: 8192
    batch_size: 16
    pooling: "native"
    supports_batching: true
    model_family: "nomic"
    capability_source: "manual"
    supports_structured_output: false
    supports_tool_calling: false
    local_only: true
    vram_gb_estimate: 0.6
    quality_score: 0.62
    speed_score: 0.75
    notes: "Current production embedding model used by the existing 768-dim Qdrant collection."
  qwen3_embedding_8b_ollama:
    provider: "ollama"
    provider_model: "qwen3-embedding:8b"
    status: "production"
    modalities: ["embedding"]
    max_context_tokens: 32768
    embedding_dimension: 4096
    distance_metric: "cosine"
    normalize_embeddings: true
    max_input_tokens: 32768
    batch_size: 8
    pooling: "native"
    supports_batching: true
    model_family: "qwen3"
    capability_source: "manual"
    supports_structured_output: false
    supports_tool_calling: false
    local_only: true
    vram_gb_estimate: 4.4
    quality_score: 0.87
    speed_score: 0.55
    notes: "MTEB SOTA 2025 multilingual embedding, strong Russian. Uses task prefix query:/passage: for best results."
  local_embedding_vllm:
    provider: "vllm"
    provider_model: "intfloat/multilingual-e5-large"
    status: "candidate"
    modalities: ["embedding"]
    max_context_tokens: 8192
    embedding_dimension: 1024
    distance_metric: "cosine"
    normalize_embeddings: true
    max_input_tokens: 8192
    batch_size: 32
    pooling: "mean"
    supports_batching: true
    model_family: "e5"
    capability_source: "manual"
    supports_structured_output: false
    supports_tool_calling: false
    local_only: true
    vram_gb_estimate: 1.2
    quality_score: 0.65
    speed_score: 0.70
  local_reranker_ollama:
    provider: "ollama"
    provider_model: "qllama/bge-reranker-v2-m3:f16"
    status: "production"
    modalities: ["rerank"]
    max_context_tokens: 8192
    max_input_tokens: 8192
    batch_size: 8
    supports_batching: true
    rerank_score_range: "0..1"
    model_family: "bge-reranker"
    capability_source: "manual"
    supports_structured_output: false
    supports_tool_calling: false
    local_only: true
    vram_gb_estimate: 1.2
    quality_score: 0.75
    speed_score: 0.70
    notes: "Cross-encoder reranker via Ollama generate. Compact (1.2 GB), reliable."
  local_reranker_openai_compatible:
    provider: "openai_compatible"
    provider_model: "BAAI/bge-reranker-v2-m3"
    status: "candidate"
    modalities: ["rerank"]
    max_context_tokens: 8192
    max_input_tokens: 8192
    batch_size: 16
    supports_batching: true
    rerank_score_range: "0..1"
    model_family: "bge-reranker"
    capability_source: "manual"
    supports_structured_output: false
    supports_tool_calling: false
    local_only: true
    vram_gb_estimate: 1.2
    quality_score: 0.70
    speed_score: 0.55
  claude_sonnet_anthropic:
    provider: "anthropic"
    provider_model: "claude-sonnet-4-6"
    status: "candidate"
    modalities: ["text", "vision", "tool_calling"]
    max_context_tokens: 200000
    supports_structured_output: true
    supports_tool_calling: true
    local_only: false
    vram_gb_estimate: 0.0
    quality_score: 0.93
    speed_score: 0.70
    notes: "Claude Sonnet via Anthropic API. Enable only with allow_cloud=True. Prompt caching supported."
  claude_haiku_anthropic:
    provider: "anthropic"
    provider_model: "claude-haiku-4-5"
    status: "candidate"
    modalities: ["text", "tool_calling"]
    max_context_tokens: 200000
    supports_structured_output: true
    supports_tool_calling: true
    local_only: false
    vram_gb_estimate: 0.0
    quality_score: 0.82
    speed_score: 0.92
    notes: "Claude Haiku — fast and cheap. Good for summarisation and context compression."
  deepseek_r1_openrouter:
    provider: "openrouter"
    provider_model: "deepseek/deepseek-r1"
    status: "candidate"
    modalities: ["text", "tool_calling"]
    max_context_tokens: 128000
    supports_structured_output: true
    supports_tool_calling: true
    local_only: false
    vram_gb_estimate: 0.0
    quality_score: 0.91
    speed_score: 0.55
    notes: "DeepSeek-R1 via OpenRouter. Strong reasoning, open-weight. Requires OPENROUTER_API_KEY."
  qwen3_235b_openrouter:
    provider: "openrouter"
    provider_model: "qwen/qwen3-235b-a22b"
    status: "candidate"
    modalities: ["text", "tool_calling"]
    max_context_tokens: 40000
    supports_structured_output: true
    supports_tool_calling: true
    local_only: false
    vram_gb_estimate: 0.0
    quality_score: 0.89
    speed_score: 0.60
    notes: "Qwen3-235B MoE via OpenRouter. Excellent multilingual + Russian support."
  qwen3_6_35b_ollama:
    provider: "ollama"
    provider_model: "qwen3.6:35b"
    status: "production"
    modalities: ["text", "vision", "tool_calling"]
    max_context_tokens: 262144
    supports_structured_output: true
    supports_tool_calling: true
    supports_multi_image: true
    local_only: true
    vram_gb_estimate: 20.0
    quality_score: 0.89
    speed_score: 0.55
    notes: "Qwen3.6 35B. Released April 2026. Hybrid multimodal (text+image+video), 262K ctx. Primary reasoning + VLM fallback."
  qwen3_5_9b_ollama:
    provider: "ollama"
    provider_model: "qwen3.5:9b"
    status: "production"
    modalities: ["text", "tool_calling"]
    max_context_tokens: 40000
    supports_structured_output: true
    supports_tool_calling: true
    local_only: true
    vram_gb_estimate: 5.5
    quality_score: 0.80
    speed_score: 0.85
    notes: "Qwen3.5 9B local model. Fast worker and fallback reasoning model."
  ministral_3_8b_ollama:
    provider: "ollama"
    provider_model: "ministral-3:8b"
    status: "production"
    modalities: ["text", "tool_calling"]
    max_context_tokens: 32000
    supports_structured_output: true
    supports_tool_calling: true
    local_only: true
    vram_gb_estimate: 4.8
    quality_score: 0.75
    speed_score: 0.98
    notes: "Ministral-3 8B — ultra-fast local model. Primary worker and orchestrator model. Excellent tool calling."
  future_reasoning_cloud:
    provider: "cloud_provider"
    provider_model: "replace-with-approved-model"
    status: "disabled"
    modalities: ["text", "tool_calling"]
    max_context_tokens: 200000
    supports_structured_output: true
    supports_tool_calling: true
    local_only: false
    vram_gb_estimate: 0.0
    quality_score: 0.0
    speed_score: 0.0
    notes: "Legacy placeholder. Use claude_sonnet_anthropic or deepseek_r1_openrouter instead."

  # ── Специализированные VLM для технических чертежей (май 2026) ──────────────
  # Источники: arXiv:2511.21631 (Qwen3-VL), ollama.com/library/qwen3-vl,
  #            arXiv:2411.02810 (CAD feature recognition), arXiv:2510.21862 (hybrid framework)

  qwen3_vl_32b_ollama:
    provider: "ollama"
    provider_model: "qwen3-vl:32b"
    status: "candidate"
    modalities: ["text", "vision"]
    max_context_tokens: 256000
    supports_structured_output: false
    supports_tool_calling: false
    supports_multi_image: true
    local_only: true
    vram_gb_estimate: 20.0
    quality_score: 0.95
    speed_score: 0.35
    notes: "Qwen3-VL 32B. Dedicated vision series. DocVQA 96.5%, OCRBench 875, 39 languages. Best local VLM for technical docs. ollama pull qwen3-vl:32b"

  qwen3_vl_8b_ollama:
    provider: "ollama"
    provider_model: "qwen3-vl:8b"
    status: "candidate"
    modalities: ["text", "vision"]
    max_context_tokens: 256000
    supports_structured_output: false
    supports_tool_calling: false
    supports_multi_image: true
    local_only: true
    vram_gb_estimate: 5.0
    quality_score: 0.87
    speed_score: 0.72
    notes: "Qwen3-VL 8B. Fast dedicated VLM, officially on Ollama. ollama pull qwen3-vl:8b"

  qwen35_27b_ollama:
    provider: "ollama"
    provider_model: "qwen3.5:27b"
    status: "candidate"
    modalities: ["text", "vision"]
    max_context_tokens: 262144
    supports_structured_output: true
    supports_tool_calling: true
    supports_multi_image: true
    local_only: true
    vram_gb_estimate: 16.5
    quality_score: 0.93
    speed_score: 0.50
    notes: "Qwen3.5 27B. Natively multimodal (early fusion). Outperforms Qwen3-VL on reasoning+vision+agents. Available on Ollama."

  internvl35_76b_vllm:
    provider: "vllm"
    provider_model: "OpenGVLab/InternVL3.5-78B-Instruct"
    status: "disabled"
    modalities: ["text", "vision"]
    max_context_tokens: 128000
    supports_structured_output: false
    supports_tool_calling: false
    supports_multi_image: true
    local_only: true
    vram_gb_estimate: 50.0
    quality_score: 0.92
    speed_score: 0.28
    notes: "InternVL3.5 78B. MMMU SOTA open-source (72.2). Requires ~50 GB VRAM — does NOT fit on RTX 3090 24 GB. Disabled."

  glm45v_ollama:
    provider: "ollama"
    provider_model: "glm4.5v"
    status: "candidate"
    modalities: ["text", "vision"]
    max_context_tokens: 128000
    supports_structured_output: false
    supports_tool_calling: false
    supports_multi_image: false
    local_only: true
    vram_gb_estimate: 22.0
    quality_score: 0.90
    speed_score: 0.35
    notes: "GLM-4.5V. 106B/12B MoE. 3D-RoPE for spatial understanding. Good for STEP/IGES geometry views."

  gemma3_27b_vision_ollama:
    provider: "ollama"
    provider_model: "gemma3:27b"
    status: "candidate"
    modalities: ["text", "vision"]
    max_context_tokens: 128000
    supports_structured_output: false
    supports_tool_calling: false
    supports_multi_image: false
    local_only: true
    vram_gb_estimate: 16.0
    quality_score: 0.82
    speed_score: 0.60
    notes: "Gemma3 27B. Accessible on any GPU >=16GB. Vision fallback when VRAM is constrained."

  gemini25_pro_google:
    provider: "gemini"
    provider_model: "gemini-2.5-pro"
    status: "candidate"
    modalities: ["text", "vision"]
    max_context_tokens: 1000000
    supports_structured_output: true
    supports_tool_calling: true
    supports_multi_image: true
    local_only: false
    vram_gb_estimate: 0.0
    quality_score: 0.96
    speed_score: 0.65
    notes: "Gemini 2.5 Pro. 1M context. Excellent for multi-page drawing sets. Cloud only: allow_cloud=True + not confidential. Requires GOOGLE_API_KEY."

routes:
  invoice_ocr:
    required_modalities: ["vision"]
    local_only: true
    fallback_chain: ["gemma4_e4b_ollama", "gemma4_26b_ollama"]
    manual_review_fallback: true
    min_quality_score: 0.0
  structured_extraction:
    required_modalities: ["text"]
    local_only: true
    fallback_chain: ["gemma4_e4b_ollama", "gemma4_26b_ollama"]
    manual_review_fallback: true
  drawing_analysis:
    required_modalities: ["vision"]
    local_only: true
    fallback_chain: ["gemma4_26b_ollama", "gemma4_e4b_ollama"]
    manual_review_fallback: true
  drawing_analysis_vlm:
    required_modalities: ["vision"]
    local_only: true
    fallback_chain:
      # gemma4:e4b (9.6 GB) and gemma4:e2b (7.2 GB) are installed → try first
      - "gemma4_e4b_ollama"
      - "gemma4_e2b_ollama"
      - "qwen3_vl_32b_ollama"
      - "qwen35_27b_ollama"
      - "qwen3_6_35b_ollama"
      - "qwen3_vl_8b_ollama"
      - "internvl35_76b_vllm"
      - "glm45v_ollama"
      - "gemma4_26b_ollama"
      - "gemma3_27b_vision_ollama"
      - "claude_sonnet_anthropic"
      - "gemini25_pro_google"
    manual_review_fallback: true
  engineering_reasoning:
    required_modalities: ["text"]
    local_only: true
    fallback_chain: ["qwen3_6_35b_ollama", "qwen3_5_9b_ollama", "gemma4_26b_ollama"]
    manual_review_fallback: true
  email_drafting:
    required_modalities: ["text"]
    local_only: true
    fallback_chain: ["qwen3_6_35b_ollama", "qwen3_5_9b_ollama", "gemma4_26b_ollama"]
    manual_review_fallback: true
  embedding:
    required_modalities: ["embedding"]
    local_only: true
    fallback_chain: ["qwen3_embedding_8b_ollama", "local_embedding_ollama", "local_embedding_vllm"]
    manual_review_fallback: false
  reranking:
    required_modalities: ["rerank"]
    local_only: true
    fallback_chain: ["local_reranker_ollama", "local_reranker_openai_compatible"]
    manual_review_fallback: true
  classification:
    required_modalities: ["text"]
    local_only: true
    fallback_chain: ["gemma4_e4b_ollama", "gemma4_26b_ollama"]
    manual_review_fallback: true
  long_context_summarization:
    required_modalities: ["text"]
    local_only: true
    fallback_chain: ["gemma4_26b_ollama"]
    manual_review_fallback: true
  tool_calling:
    required_modalities: ["tool_calling"]
    local_only: true
    fallback_chain: ["qwen3_6_35b_ollama", "qwen3_5_9b_ollama", "gemma4_26b_ollama", "claude_sonnet_anthropic", "deepseek_r1_openrouter"]
    manual_review_fallback: true
  speech:
    required_modalities: ["audio"]
    local_only: true
    fallback_chain: ["gemma4_e4b_ollama"]
    manual_review_fallback: true
  orchestrator_planning:
    required_modalities: ["text"]
    local_only: true
    fallback_chain: ["qwen3_5_9b_ollama", "qwen3_6_35b_ollama", "gemma4_26b_ollama"]
    manual_review_fallback: false
    notes: "Orchestrator planning. Primary: qwen3.5:9b (fast local). Fallback: qwen3.6:35b (large), gemma4:26b if installed."
  code_generation:
    required_modalities: ["text"]
    local_only: false
    fallback_chain: ["claude_sonnet_anthropic", "gemma4_26b_ollama"]
    manual_review_fallback: false
    notes: "CapabilityBuilder code generation: Claude API preferred, local 26b as fallback."
