    vram_gb_estimate: 5.0
    quality_score: 0.82
    speed_score: 0.80
    notes: "Qwen2.5-VL 7B AWQ. Vision language model. ~5 GB VRAM. Good for technical drawing analysis via vLLM."
  llamacpp_active:
    provider: "llamacpp"
    provider_model: "local"
    status: "candidate"
    # vision is available when the loaded GGUF ships an mmproj projector
    # (llama-server auto-detects it); leave it selectable for OCR/vision slots.
    modalities: ["text", "vision"]
    max_context_tokens: 8192
    supports_structured_output: false
    supports_tool_calling: false
    local_only: true
    vram_gb_estimate: 0.0
    quality_score: 0.0
    speed_score: 0.0
    notes: "Active llama.cpp model (GGUF). Model path and context size configured via llamacpp settings. Vision works only if the GGUF has an mmproj. Enable after loading a GGUF model."

  vllm_active:
    provider: "vllm"
    provider_model: "local"
    # vLLM serves one model under --served-model-name "local"; the actual model
    # is set via VLLM_MODEL at deploy and the Library tab. Assigning this makes a
    # slot use the vLLM server (and autostarts it); vision depends on the served
    # model. Kept selectable even while the server is stopped.
    status: "candidate"
    modalities: ["text", "vision"]
    max_context_tokens: 16384
    supports_structured_output: true
    supports_tool_calling: false
    local_only: true
    vram_gb_estimate: 0.0
    quality_score: 0.0
    speed_score: 0.0
    notes: "Active vLLM model. Served as 'local'; concrete model via VLLM_MODEL / Library. Enable after a vLLM model is configured."

