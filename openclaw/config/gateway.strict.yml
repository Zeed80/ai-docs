agent:
  name: Света
  description: AI-сотрудник производственного предприятия
  language: ru
models:
  reasoning:
    provider: ollama
    model: ${AGENT_MODEL:-qwen3.5:9b}
    base_url: ${OLLAMA_URL:-http://localhost:11434}
    fallback:
      provider: anthropic
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY:-}
  ocr:
    provider: ollama
    model: ${OCR_MODEL:-gemma4:e4b}
    base_url: ${OLLAMA_URL:-http://localhost:11434}
backend:
  base_url: ${FASTAPI_URL:-http://localhost:8000}
  timeout: 30
skills:
  registry: ./skills/_registry.yml
  exposed:
  - doc.classify
  - doc.extract
  - doc.get
  - doc.ingest
  - doc.list
  - doc.summarize
  - email.draft
  - email.risk_check
  - email.send
  - graph.chunk_create
  - graph.edge_create
  - graph.evidence_create
  - graph.mention_create
  - graph.neighborhood
  - graph.node_create
  - graph.path
  - graph.review_decide
  - graph.review_list
  - invoice.approve
  - invoice.compare_prices
  - invoice.export.1c.prepare
  - invoice.export.excel
  - invoice.reject
  - invoice.validate
  - memory.embeddings_index_active
  - memory.embeddings_rebuild
  - memory.embeddings_rebuild_active
  - memory.embeddings_stats
  - memory.explain
  - memory.reindex
  - memory.search
  - ntd.check_availability
  - ntd.check_get
  - ntd.check_list
  - ntd.clause_create
  - ntd.control_settings_get
  - ntd.control_settings_update
  - ntd.document_create
  - ntd.document_create_from_source
  - ntd.document_index
  - ntd.document_list
  - ntd.finding_decide
  - ntd.norm_control_run
  - ntd.norm_control_run_payload
  - ntd.requirement_create
  - ntd.requirement_search
  - tech.correction_record
  - tech.learning_rule_activate
  - tech.learning_rule_create
  - tech.learning_rule_list
  - tech.learning_suggest
  - tech.norm_estimate_approve
  - tech.norm_estimate_create
  - tech.norm_estimate_suggest
  - tech.operation_add
  - tech.operation_template_create
  - tech.operation_template_list
  - tech.process_plan_approve
  - tech.process_plan_create
  - tech.process_plan_draft_from_document
  - tech.process_plan_get
  - tech.process_plan_list
  - tech.process_plan_validate
  - tech.resource_create
  - tech.resource_list
  approval_gates:
  - email.send
  - invoice.approve
  - invoice.export.1c.prepare
  - invoice.reject
  - tech.learning_rule_activate
  - tech.norm_estimate_approve
  - tech.process_plan_approve
scenarios:
- name: assisted_review
  path: ./scenarios/assisted-review.yml
  trigger:
    type: event
    event: document.review_opened
- name: memory_maintenance
  path: ./scenarios/memory-maintenance.yml
  trigger:
    type: schedule
    cron: 30 2 * * *
prompts:
  base: ./prompts/base.md
  roles:
    manager: ./prompts/role-manager.md
    engineer: ./prompts/role-engineer.md
    accountant: ./prompts/role-accountant.md
    buyer: ./prompts/role-buyer.md
channels:
  websocket:
    enabled: true
    path: /ws/chat
    auth: none
auth:
  provider: authentik
  oauth2:
    issuer: ${AUTHENTIK_URL:-http://authentik:9000}/application/o/ai-workspace/
    client_id: ${OAUTH_CLIENT_ID:-}
    client_secret: ${OAUTH_CLIENT_SECRET:-}
logging:
  level: info
  format: json
  audit: true
metadata:
  generated: true
  source: openclaw/config/gateway.yml
  policy: strict_generated_tools_only
