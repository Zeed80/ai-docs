version: "3.9"

services:
  frontend:
    environment:
      NEXT_PUBLIC_AGENT_WS_MODE: ${NEXT_PUBLIC_AGENT_WS_MODE:-legacy}
      NEXT_PUBLIC_OPENCLAW_WS_URL: ${NEXT_PUBLIC_OPENCLAW_WS_URL:-ws://localhost:18789}

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-dev-openclaw-token}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-1}
      TZ: ${OPENCLAW_TZ:-Europe/Moscow}
    volumes:
      - ../openclaw/official:/home/node/.openclaw
      - ../openclaw/official/workspace:/home/node/.openclaw/workspace
      - ..:/home/node/.openclaw/workspace/project:ro
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-dev-openclaw-token}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-1}
      BROWSER: echo
      TZ: ${OPENCLAW_TZ:-Europe/Moscow}
    volumes:
      - ../openclaw/official:/home/node/.openclaw
      - ../openclaw/official/workspace:/home/node/.openclaw/workspace
      - ..:/home/node/.openclaw/workspace/project:ro
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway
    healthcheck:
      disable: true
