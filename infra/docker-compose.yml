x-backend-env: &backend-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USER: ${POSTGRES_USER:-aiworkspace}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
  POSTGRES_DB: ${POSTGRES_DB:-aiworkspace}
  REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-changeme}
  MINIO_BUCKET: ${MINIO_BUCKET:-documents}
  QDRANT_URL: http://qdrant:6333
  QDRANT_API_KEY: ${QDRANT_API_KEY:-}
  OLLAMA_URL: ${OLLAMA_URL:-http://host-gateway:11434}
  # ComfyUI (image studio). Defaults to a host-deployed ComfyUI reachable via the
  # host-gateway alias; override with COMFYUI_URL for an external node.
  COMFYUI_URL: ${COMFYUI_URL:-http://host-gateway:8188}
  # Neural CAD vectorizer (Ф3, cad-vectorizer profile) — superseded by
  # technical-vectorizer below, kept configurable but no longer used in
  # arbitrate_recognition (see cad_recognize/technical_vectorizer.py).
  CAD_VECTORIZER_URL: ${CAD_VECTORIZER_URL:-http://cad-vectorizer:8090}
  # Technical-drawing line vectorizer (technical-vectorizer profile) — the
  # primary neural recognizer now. Optional — the pipeline falls back to CV
  # when unreachable (NEURAL_UNAVAILABLE).
  TECHNICAL_VECTORIZER_URL: ${TECHNICAL_VECTORIZER_URL:-http://technical-vectorizer:8091}
  CAD_KERNEL_URL: ${CAD_KERNEL_URL:-http://cad-kernel:8092}
  OLLAMA_MODEL_REASONING: ${OLLAMA_MODEL_REASONING:-qwen3.5:9b}
  OLLAMA_MODEL_OCR: ${OLLAMA_MODEL_OCR:-gemma4:e4b}
  APP_ENV: ${APP_ENV:-development}
  APP_SECRET_KEY: ${APP_SECRET_KEY:-dev-secret-key}
  APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
  CSRF_SECRET: ${CSRF_SECRET:-dev-csrf-secret}
  CSP_ENABLED: ${CSP_ENABLED:-false}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
  AUTH_ENABLED: ${AUTH_ENABLED:-false}
  # Bootstrap admin: the matching user is auto-promoted to admin on first login
  # while no admin exists yet (see auth/user_service.upsert_user). Without this
  # the first SSO user lands as viewer → 403 on all admin endpoints.
  INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
  AGENT_SERVICE_KEY: ${AGENT_SERVICE_KEY:-agent-internal-key-2026}
  SKILL_RUNNER_URL: http://skill-runner:8077
  GPU_TEMP_HELPER_URL: http://gpu-temp-helper:9966
  TRUSTED_PROXY: ${TRUSTED_PROXY:-true}
  AUTHENTIK_URL: ${AUTHENTIK_URL:-http://authentik-server:9000}
  AUTHENTIK_EXTERNAL_URL: ${AUTHENTIK_EXTERNAL_URL:-}
  AUTHENTIK_SLUG: ${AUTHENTIK_SLUG:-ai-workspace}
  OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-}
  OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-}
  AUTHENTIK_API_TOKEN: ${AUTHENTIK_API_TOKEN:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  # Forwarded into LoRA trainer containers for gated HF repos (FLUX.2-dev).
  HF_TOKEN: ${HF_TOKEN:-}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
  TELEGRAM_NOTIFICATIONS_CHAT_ID: ${TELEGRAM_NOTIFICATIONS_CHAT_ID:-}
  TELEGRAM_NOTIFICATIONS_ENABLED: ${TELEGRAM_NOTIFICATIONS_ENABLED:-false}
  # Mobile push via self-hosted ntfy (no Google services).
  NTFY_ENABLED: ${NTFY_ENABLED:-false}
  NTFY_URL: ${NTFY_URL:-http://ntfy:80}
  NTFY_EXTERNAL_URL: ${NTFY_EXTERNAL_URL:-}
  NTFY_TOKEN: ${NTFY_TOKEN:-}
  # Directory (volume) where the signed APK + version.json are served at /download.
  RELEASES_DIR: /releases
  AIAGENT_ROOT: /aiagent
  # RRF graph-branch weight — raised from default 0.5 after measuring on the
  # populated business-entity graph (Part D): at 0.5, 0/4 relational sample
  # queries surfaced a graph hit in the top-10 fused results; at 1.0, 2/4 did,
  # with no regression on test_graph_memory.py/test_memory_api.py.
  MEMORY_RRF_GRAPH_WEIGHT: ${MEMORY_RRF_GRAPH_WEIGHT:-1.0}
  LLAMACPP_URL: ${LLAMACPP_URL:-http://llama-server:8080}
  LLAMACPP_MODEL: ${LLAMACPP_MODEL:-/models/model.gguf}
  LLAMACPP_CTX_SIZE: ${LLAMACPP_CTX_SIZE:-16384}
  LLAMACPP_KV_CACHE_TYPE: ${LLAMACPP_KV_CACHE_TYPE:-q8_0}
  LLAMACPP_N_GPU_LAYERS: ${LLAMACPP_N_GPU_LAYERS:--1}
  LLAMACPP_PARALLEL: ${LLAMACPP_PARALLEL:-2}
  LLAMACPP_FLASH_ATTN: ${LLAMACPP_FLASH_ATTN:-true}
  # compose service name used by activate_model to find the container via Docker API
  LLAMACPP_SERVICE_NAME: llama-server
  LLAMACPP_MMPROJ: ${LLAMACPP_MMPROJ:-}
  # Local OpenAI-compatible provider URLs (optional, override agent config defaults)
  VLLM_URL: ${VLLM_URL:-http://vllm-server:8000}
  VLLM_SERVICE_NAME: vllm-server
  VLLM_MODELS_DIR: /vllm-models
  GPU_TOTAL_VRAM_GB: ${GPU_TOTAL_VRAM_GB:-24.0}
  LMSTUDIO_URL: ${LMSTUDIO_URL:-}
  OPENAI_COMPATIBLE_URL: ${OPENAI_COMPATIBLE_URL:-}

x-authentik-env: &authentik-env
  AUTHENTIK_REDIS__HOST: redis
  AUTHENTIK_REDIS__PORT: "6379"
  AUTHENTIK_REDIS__DB: "1"
  # Redis runs with --requirepass when REDIS_PASSWORD is set; Authentik must
  # send it too or its flow engine/sessions fail ("Authentication required").
  AUTHENTIK_REDIS__PASSWORD: ${REDIS_PASSWORD:-}
  AUTHENTIK_POSTGRESQL__HOST: authentik-db
  AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_DB_USER:-authentik}
  AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD:-authentik}
  AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_DB_NAME:-authentik}
  AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:-please-change-me-in-production}
  AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
  AUTHENTIK_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
  # Trust X-Forwarded-* headers from Traefik (Docker private ranges)
  AUTHENTIK_WEB__TRUSTED_PROXY_CIDRS: "172.16.0.0/12,10.0.0.0/8,192.168.0.0/16"
  # Bootstrap admin account — used only on first start
  AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-admin@company.com}
  AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-changeme_in_production}
  # Expose env vars to blueprints for OAuth client credentials
  OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-ai-workspace}
  OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-}
  OAUTH_REDIRECT_URI_1: ${OAUTH_REDIRECT_URI_1:-http://localhost/auth/callback}
  OAUTH_REDIRECT_URI_2: ${OAUTH_REDIRECT_URI_2:-http://localhost:8000/api/auth/callback}
  # Domain used by the blueprint to build strict https redirect_uris for production
  TRAEFIK_DOMAIN: ${TRAEFIK_DOMAIN:-localhost}

services:
  # === Database ===
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiworkspace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-aiworkspace}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiworkspace}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app

  # === Cache & Broker ===
  redis:
    image: redis:7-alpine
    command: >
      sh -c "redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli $${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app

  # === Object Storage ===
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  # === MinIO Init (create bucket) ===
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-changeme};
      mc mb --ignore-existing local/$${MINIO_BUCKET:-documents};
      echo 'Bucket ready';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
    networks:
      - app

  # === Vector Store ===
  qdrant:
    image: qdrant/qdrant:latest
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  # === AI (Local) ===
  ollama:
    image: ollama/ollama:latest
    profiles:
      - embedded-ollama
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # RTX 3090 24 GB: keep OCR model (9.2 GB) + embedding model (4.4 GB) loaded at once.
      # Sequential pipeline ensures they don't run in parallel — just avoids cold reloads.
      OLLAMA_MAX_LOADED_MODELS: "2"
      OLLAMA_NUM_PARALLEL: "1"
    # Reachable internally as http://ollama:11434. Host port published only in dev
    # (docker-compose.dev.yml) — never exposed in production.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - app

  # === ComfyUI — image generation / editing (drawings studio) ===
  # Optional, opt-in. Bring up with:  docker compose --profile comfyui up -d
  # Reachable internally as http://comfyui:8188 (no published port — on-prem only;
  # confidential drawings never leave the local network). The backend manages
  # this container (status/install/update) via /api/comfyui-admin.
  # Override the image via COMFYUI_IMAGE; mount your installed models/output into
  # the named volumes (paths depend on the chosen image — adjust if needed).
  comfyui:
    image: ${COMFYUI_IMAGE:-yanwk/comfyui-boot:latest}
    profiles:
      - comfyui
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - comfyui_models:/root/ComfyUI/models
      - comfyui_output:/root/ComfyUI/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - app

  # === Neural CAD vectorizer (Ф3, studio «Точный чертёж») ===
  # Opt-in (own GPU footprint, competes with comfyui/ollama/lora-worker on the
  # single GPU) — start explicitly: docker compose --profile cad-vectorizer up
  # Checkpoints come from infra/cad-vectorizer training runs (tools/cad-dataset/
  # + infra/cad-vectorizer/train.py), mounted read-only; swap CAD_VECTORIZER_CHECKPOINT
  # to point at a different file without rebuilding the image.
  cad-vectorizer:
    build:
      context: ./cad-vectorizer
      dockerfile: Dockerfile
    profiles:
      - cad-vectorizer
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      CAD_VECTORIZER_CHECKPOINT: /models/best.pt
      REPO_BACKEND: /repo/backend
    volumes:
      - cad_vectorizer_models:/models:ro
      - ../backend:/repo/backend:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8090/health', timeout=3).status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app

  # === Technical-drawing line vectorizer (2026-07-11, studio «Точный чертёж») ===
  # Wraps a vendored, openly-licensed (MPL-2.0) PRETRAINED model — Deep
  # Vectorization of Technical Drawings — replacing cad-vectorizer above as
  # the primary neural recognizer (that one, trained from scratch on
  # synthetic data only, never beat CV on real photos; this one does,
  # validated live). This is part of the production vectorize contract, so it
  # starts with the core stack; provider model servers remain profile-gated.
  # Checkpoint is the official published "line" model (see
  # infra/technical-vectorizer/README-checkpoint.md for the download link),
  # mounted read-only; swap TECHNICAL_VECTORIZER_CHECKPOINT to point at a
  # different file without rebuilding the image.
  technical-vectorizer:
    build:
      context: ./technical-vectorizer
      dockerfile: Dockerfile
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      TECHNICAL_VECTORIZER_CHECKPOINT: /models/model_lines.weights
    volumes:
      - technical_vectorizer_models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8091/health', timeout=3).status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app

  # === Headless engineering CAD kernel ===
  # FreeCAD/OpenCascade compiles only human-confirmed feature trees. It has no
  # credentials, DB, MinIO, Docker socket, or published host port.
  cad-kernel:
    build:
      context: ./cad-kernel
      dockerfile: Dockerfile
    read_only: true
    tmpfs:
      - /tmp:size=512m,mode=1777
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g
    cpus: 2.0
    pids_limit: 256
    healthcheck:
      test: ["CMD-SHELL", "/opt/cad-kernel/bin/python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8092/health', timeout=3).status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - app

  # === GPU Telemetry Helper ===
  # Privileged sidecar: NVML telemetry + GDDR6/GDDR6X memory junction temp
  # via PCIe BAR0 mmap (gddr6 method) — NVML does not expose it on GeForce.
  # Internal-only (no published ports); backend reads http://gpu-temp-helper:9966.
  gpu-temp-helper:
    build:
      context: ./gpu-temp-helper
      dockerfile: Dockerfile
    runtime: nvidia
    privileged: true   # /dev/mem + PCIe BAR mmap for memory junction temp
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: utility
      # Same key the backend uses; gates POST /power-limit on the shared network.
      POWER_LIMIT_TOKEN: ${AGENT_SERVICE_KEY:-agent-internal-key-2026}
    volumes:
      # Saved power limit — re-applied on every start (NVML resets on reboot).
      - gpu_temp_state:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9966/health', timeout=3).status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app

  # === AI (Local) — llama.cpp server ===
  # Profile: embedded-llamacpp (opt-in, same as embedded-ollama)
  # Usage: docker compose --profile embedded-llamacpp up
  #        make dev-llamacpp
  # Mount your GGUF models: -v /path/to/models:/models
  # GPU image variant: ghcr.io/ggml-org/llama.cpp:server-cuda  (NVIDIA)
  #                    ghcr.io/ggml-org/llama.cpp:server-rocm   (AMD)
  #
  # Vision (multimodal) support:
  #   Download the mmproj GGUF for your model and place it in the models volume.
  #   Set LLAMACPP_MMPROJ=/models/mmproj-YourModel.gguf  — OR —
  #   the script auto-detects any mmproj-*.gguf next to the active model.
  llama-server:
    image: ${LLAMACPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    runtime: nvidia          # required for CUDA images; harmless if nvidia runtime is default
    profiles:
      - embedded-llamacpp
    volumes:
      - llamacpp_models:/models
    # Reachable internally as http://llama-server:8080. Host port published only in
    # dev (docker-compose.dev.yml) — never exposed in production.
    # Wrapper: start without model if GGUF missing (API-only mode for model management).
    # --cache-type-k/v replaces old --kv-cache-type flag (llama.cpp b4300+).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        CTX=$${LLAMACPP_CTX_SIZE:-16384}
        GPU=$${LLAMACPP_N_GPU_LAYERS:--1}
        KV=$${LLAMACPP_KV_CACHE_TYPE:-q8_0}
        PAR=$${LLAMACPP_PARALLEL:-2}
        FA=$${LLAMACPP_FLASH_ATTN:-true}
        # .active_model file written by backend/activate_model takes priority over env var.
        # This lets the UI switch models without recreating the container.
        if [ -f /models/.active_model ]; then
          MDL=$(cat /models/.active_model)
          echo "Loading model from .active_model: $$MDL"
        else
          MDL=$${LLAMACPP_MODEL:-/models/model.gguf}
        fi
        BASEARGS="--host 0.0.0.0 --port 8080 --ctx-size $$CTX --n-gpu-layers $$GPU --cache-type-k $$KV --cache-type-v $$KV --parallel $$PAR --metrics"
        if [ -f "$$MDL" ]; then
          MODELARGS="--model $$MDL"
          [ "$$FA" = "true" ] && MODELARGS="$$MODELARGS --flash-attn on"
          # Vision support: use explicit LLAMACPP_MMPROJ or auto-detect mmproj-*.gguf
          # next to the model file. Required to enable vision=true in /props.
          MMPROJ=$${LLAMACPP_MMPROJ:-}
          if [ -z "$$MMPROJ" ]; then
            MDLDIR=$$(dirname "$$MDL")
            MDLBASE=$$(basename "$$MDL" .gguf)
            # Try exact match first (mmproj-ModelName.gguf), then any mmproj-*.gguf
            for CANDIDATE in "$$MDLDIR/mmproj-$${MDLBASE}.gguf" "$$MDLDIR"/mmproj-*.gguf; do
              if [ -f "$$CANDIDATE" ]; then
                MMPROJ="$$CANDIDATE"
                break
              fi
            done
          fi
          if [ -n "$$MMPROJ" ] && [ -f "$$MMPROJ" ]; then
            echo "Vision projector found: $$MMPROJ"
            MODELARGS="$$MODELARGS --mmproj $$MMPROJ"
          fi
        else
          echo "No GGUF at $$MDL — starting in API-only mode (use /settings/llamacpp to download a model)"
          MODELARGS=""
        fi
        exec /app/llama-server $$BASEARGS $$MODELARGS
    environment:
      GGML_CUDA_NO_PINNED: "1"
      LLAMACPP_MODEL: ${LLAMACPP_MODEL:-/models/model.gguf}
      LLAMACPP_MMPROJ: ${LLAMACPP_MMPROJ:-}
      LLAMACPP_CTX_SIZE: ${LLAMACPP_CTX_SIZE:-16384}
      LLAMACPP_KV_CACHE_TYPE: ${LLAMACPP_KV_CACHE_TYPE:-q8_0}
      LLAMACPP_N_GPU_LAYERS: ${LLAMACPP_N_GPU_LAYERS:--1}
      LLAMACPP_PARALLEL: ${LLAMACPP_PARALLEL:-2}
      LLAMACPP_FLASH_ATTN: ${LLAMACPP_FLASH_ATTN:-true}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - app

  # === AI (Local) — vLLM server ===
  # Profile: embedded-vllm (opt-in)
  # Usage: docker compose --profile embedded-vllm up
  #        make dev-vllm
  # Place model directory in vllm_models volume.
  # Designed for RTX 3090 24 GB; adjust VLLM_GPU_MEMORY_UTILIZATION for other GPUs.
  # Compatible formats: Safetensors, AWQ, GPTQ (download via /settings/models).
  vllm-server:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.22.0}
    profiles:
      - embedded-vllm
    # Reachable internally as http://vllm-server:8000. Host port published only in
    # dev (docker-compose.dev.yml) — never exposed in production.
    volumes:
      - vllm_models:/models
      # Shared read-only access to llama.cpp GGUF models.
      # vLLM ≥0.6 can load GGUF directly: set VLLM_QUANTIZATION=gguf when activating.
      - llamacpp_models:/llamacpp-models:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        MDL=$${VLLM_MODEL:-}
        # A model is "local" if it starts with /. HuggingFace IDs (e.g. Qwen/Qwen2.5-1.5B-Instruct)
        # do NOT start with / — vLLM downloads them automatically.
        IS_LOCAL=false
        if echo "$$MDL" | grep -q "^/"; then IS_LOCAL=true; fi

        if [ -z "$$MDL" ] || ([ "$$IS_LOCAL" = "true" ] && [ ! -e "$$MDL" ]); then
          echo "No model set or local path not found — starting vLLM in health-only mode."
          echo "  Set VLLM_MODEL to a HuggingFace ID (e.g. Qwen/Qwen2.5-1.5B-Instruct)"
          echo "  or a local path (e.g. /models/mymodel). Use /settings/models to manage."
          python3 -u - <<'PYEOF'
        from http.server import BaseHTTPRequestHandler, HTTPServer
        import json
        class H(BaseHTTPRequestHandler):
            def log_message(self, *a): pass
            def do_GET(self):
                if self.path == '/health':
                    self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                elif self.path == '/v1/models':
                    body = json.dumps({'object':'list','data':[]}).encode()
                    self.send_response(200); self.send_header('Content-Type','application/json'); self.end_headers(); self.wfile.write(body)
                else:
                    self.send_response(404); self.end_headers()
        HTTPServer(('0.0.0.0', 8000), H).serve_forever()
        PYEOF
        else
          # Auto-detect GGUF: use --quantization gguf when loading from a .gguf file
          QUANT=$${VLLM_QUANTIZATION:-}
          if echo "$$MDL" | grep -q "\.gguf$"; then
            QUANT="gguf"
          fi
          QFLAG=""
          [ -n "$$QUANT" ] && QFLAG="--quantization $$QUANT"
          exec python3 -m vllm.entrypoints.openai.api_server \
            --model $$MDL \
            --host 0.0.0.0 \
            --port 8000 \
            --gpu-memory-utilization $${VLLM_GPU_MEMORY_UTILIZATION:-0.85} \
            --max-model-len $${VLLM_MAX_MODEL_LEN:-16384} \
            --dtype $${VLLM_DTYPE:-bfloat16} \
            --tensor-parallel-size $${VLLM_TENSOR_PARALLEL:-1} \
            $$QFLAG \
            --served-model-name local
        fi
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 90s
    environment:
      # Default: Qwen3-VL-8B-Instruct (vision + text, 20.9 GB VRAM on RTX 3090)
      # Override: VLLM_MODEL=cyankiwi/Qwen3.6-27B-AWQ-INT4 (requires ~22+ GB, tight fit)
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen3-VL-8B-Instruct}
      VLLM_GPU_MEMORY_UTILIZATION: ${VLLM_GPU_MEMORY_UTILIZATION:-0.90}
      VLLM_MAX_MODEL_LEN: ${VLLM_MAX_MODEL_LEN:-12000}
      VLLM_DTYPE: ${VLLM_DTYPE:-bfloat16}
      VLLM_QUANTIZATION: ${VLLM_QUANTIZATION:-}
      VLLM_TENSOR_PARALLEL: ${VLLM_TENSOR_PARALLEL:-1}
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      # Required for CUDA 13.x host compatibility
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      NVIDIA_VISIBLE_DEVICES: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - app

  # === Backend API ===
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      <<: *backend-env
      LLAMACPP_MODELS_DIR: /llamacpp-models
      VLLM_MODELS_DIR: /vllm-models
    volumes:
      - ../aiagent:/aiagent:ro
      - llamacpp_models:/llamacpp-models
      - vllm_models:/vllm-models
      # LoRA uploads/datasets shared with worker+trainer (upload API writes here);
      # the ComfyUI node's loras dir — checkpoint deploys run in THIS container
      # (POST /api/lora/runs/{id}/deploy), not in a worker.
      - lora_data:/lora-data
      - /root/comfy/ComfyUI/models/loras:/comfyui-loras
      # Backups produced from the admin GUI (maintenance API) land here.
      - backups_data:/app/backups
      # Signed mobile APK + version.json, served publicly at /download (CI/deploy writes here).
      - releases_data:/releases
      # Docker socket — lets backend restart llama-server / vllm-server when activating a new model
      # and run GUI backups (pg_dump exec, volume tars).
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      cad-kernel:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  # === Skill Runner — isolated executor for agent-generated code ===
  # Generated skills run ONLY here: non-root, read-only fs, tmpfs /tmp,
  # cpu/mem/pids limits, no DB/storage credentials in the environment.
  # Anything a generated skill needs must go through the backend HTTP API,
  # where normal auth applies.
  skill-runner:
    build:
      context: ./skill-runner
      dockerfile: Dockerfile
    read_only: true
    tmpfs:
      - /tmp:size=64m
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 64
    volumes:
      - ../backend/app/ai/generated_skills:/skills:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8077/health', timeout=3).status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app

  # === Celery Worker — IO/CPU lane (parallel) ===
  # Handles non-GPU work: IMAP polling, file storage, DB-only extraction tasks
  # (process_approved_document, check_invoice_anomalies), scheduler/proactive,
  # exports. Safe to parallelise — it never touches the GPU. Note: the ``gpu``
  # queue is deliberately NOT listed here so GPU steps only ever run on the
  # dedicated single-flight worker below.
  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker -l info -c 4 -Q celery,extraction,ingest,scheduler
    environment:
      <<: *backend-env
      SKIP_DB_MIGRATE: "1"
    volumes:
      - ../aiagent:/aiagent:ro
      # On-demand start of vLLM/llama.cpp servers when a document task routes to
      # them (see app/ai/server_lifecycle.py). Takes effect after a worker rebuild.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # LoRA training (studio tab): datasets/runs shared with the trainer
      # container; the ComfyUI node's loras dir for checkpoint deploys.
      - lora_data:/lora-data
      - /root/comfy/ComfyUI/models/loras:/comfyui-loras
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - app

  # === Celery Worker — GPU lane (STRICTLY sequential) ===
  # Serves the GPU-bound queues with concurrency 1, so every GPU-bound step
  # (classify / OCR+extract / verify / embed / drawing VLM / studio image jobs) runs one at a time
  # and pipeline steps of different documents never overlap on the GPU. Do NOT
  # raise -c above 1 and do NOT add replicas: that would reintroduce GPU
  # contention. (A Redis single-flight lock in app/tasks/gpu_lock.py guards the
  # invariant even if this is misconfigured.)
  celery-worker-gpu:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker -l info -c 1 -Q gpu_priority,gpu,studio -n gpu@%h
    environment:
      <<: *backend-env
      SKIP_DB_MIGRATE: "1"
    volumes:
      - ../aiagent:/aiagent:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - app

  # === Celery Worker — LoRA lane (single-flight, long-running) ===
  # Serves only the ``lora`` queue: dataset preparation (hours of VLM
  # captioning) and training-run supervision (up to 48h per run, trainer
  # container via docker SDK). -c 1 keeps GPU-hungry jobs naturally
  # serialized and off the general-purpose workers. Do NOT raise -c.
  celery-worker-lora:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker -l info -c 1 -Q lora -n lora@%h
    environment:
      <<: *backend-env
      SKIP_DB_MIGRATE: "1"
    volumes:
      - ../aiagent:/aiagent:ro
      # Trainer containers are started through the docker SDK.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Datasets/uploads/run outputs shared with the trainer container.
      - lora_data:/lora-data
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - app

  # === Celery Beat ===
  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat -l info
    environment:
      <<: *backend-env
      SKIP_DB_MIGRATE: "1"
    volumes:
      - ../aiagent:/aiagent:ro
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - app

  # === ntfy — self-hosted push (no Google services) ===
  # Backend publishes per-device topics here; the mobile app subscribes via Traefik
  # (push.<domain>). Payloads carry only title/body/type/action_url — never document content.
  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    command: serve
    restart: unless-stopped
    environment:
      NTFY_BASE_URL: ${NTFY_EXTERNAL_URL:-http://localhost}
      NTFY_LISTEN_HTTP: ":80"
      NTFY_CACHE_FILE: /var/lib/ntfy/cache.db
      NTFY_CACHE_DURATION: "12h"
      NTFY_AUTH_FILE: /var/lib/ntfy/auth.db
      # read-only default: anonymous clients may SUBSCRIBE to a topic they know
      # (per-device topics are random secrets) but may NOT publish. The backend
      # publishes with a write token — provision once:
      #   docker compose exec ntfy ntfy user add --role=admin backend
      #   docker compose exec ntfy ntfy token add backend   # → put in NTFY_TOKEN
      # This blocks anonymous/spoofed notifications. (Push is opt-in via NTFY_ENABLED.)
      NTFY_AUTH_DEFAULT_ACCESS: ${NTFY_AUTH_DEFAULT_ACCESS:-read-only}
      NTFY_BEHIND_PROXY: "true"
    volumes:
      - ntfy_data:/var/lib/ntfy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:80/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app

  # === APK builder (on-demand) ===
  # Not a long-running service: built as an image (toolchain + shell source) and
  # launched on demand by the backend (via the Docker socket) when an admin clicks
  # "собрать приложение" in settings. `profiles` keeps it from starting on `up`;
  # it's built explicitly (install.sh/update.sh pass --profile apk-builder).
  apk-builder:
    build:
      context: ..
      dockerfile: infra/apk-builder/Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-infra}-apk-builder
    profiles: ["apk-builder"]
    entrypoint: ["true"]
    networks:
      - app

  # === Frontend ===
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8000
      INTERNAL_API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app

  # === Authentik SSO ===
  authentik-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${AUTHENTIK_DB_USER:-authentik}
      POSTGRES_PASSWORD: ${AUTHENTIK_DB_PASSWORD:-authentik}
      POSTGRES_DB: ${AUTHENTIK_DB_NAME:-authentik}
    volumes:
      - authentik_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTHENTIK_DB_USER:-authentik}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.12.3
    command: server
    environment:
      <<: *authentik-env
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    # No host ports: Authentik is reached through Traefik (OIDC paths /application/,
    # /if/, /flows/, /.well-known/, /api/v3/). Direct ports 9100/9443 are added back
    # only in dev (docker-compose.dev.yml).
    depends_on:
      authentik-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.12.3
    command: worker
    environment:
      <<: *authentik-env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - authentik_media:/media
      - authentik_templates:/templates
      - ./authentik/blueprints:/blueprints/custom
    depends_on:
      authentik-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app

  # === Reverse Proxy ===
  # SECURE-BY-DEFAULT: only 80/443 are published. The insecure dashboard port (8080)
  # and direct service ports (authentik 9100/9443, ML 1143x) are added back ONLY in
  # docker-compose.dev.yml. docker compose appends `ports` across files, so they can
  # never be removed by an overlay — the base must stay minimal.
  traefik:
    image: traefik:v3.2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik_acme:/etc/traefik/acme
    environment:
      TRAEFIK_DOMAIN: ${TRAEFIK_DOMAIN:-localhost}
      TRAEFIK_ACME_EMAIL: ${TRAEFIK_ACME_EMAIL:-admin@company.com}
    networks:
      - app

volumes:
  # LoRA training data (datasets, run configs, outputs) — shared between the
  # celery worker and on-demand trainer containers.
  lora_data:
  # Host HuggingFace cache (Qwen-Image-Edit-2511, ~54GB already downloaded):
  # bind, not a fresh volume, so the trainer never re-downloads it.
  hf_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /root/.cache/huggingface
  postgres_data:
  redis_data:
  gpu_temp_state:
  minio_data:
  qdrant_data:
  ollama_data:
  llamacpp_models:
  vllm_models:
  comfyui_models:
  comfyui_output:
  cad_vectorizer_models:
  technical_vectorizer_models:
  traefik_acme:
  authentik_db_data:
  authentik_media:
  authentik_templates:
  backups_data:
  releases_data:
  ntfy_data:
  apk_keystore:

networks:
  app:
    driver: bridge
