# Traefik dynamic routing for production.
# Routes by PathPrefix only — works with any IP, hostname, or domain without reconfiguration.
# TLS (Let's Encrypt) is handled automatically via TLS-ALPN-01 challenge for any domain
# pointing to this server. For plain HTTP (no domain, LAN/IP access), the web entryPoint
# serves traffic directly; comment out the http→https redirect in traefik.prod.yml first.
http:
  routers:
    frontend:
      rule: "PathPrefix(`/`)"
      service: frontend
      entryPoints:
        - web
        - websecure
      tls:
        certResolver: letsencrypt
      priority: 1

    backend-api:
      rule: "PathPrefix(`/api`)"
      service: backend
      entryPoints:
        - web
        - websecure
      tls:
        certResolver: letsencrypt
      priority: 100

    backend-ws:
      rule: "PathPrefix(`/ws`)"
      service: backend
      entryPoints:
        - web
        - websecure
      tls:
        certResolver: letsencrypt
      priority: 100

    backend-health:
      rule: "Path(`/health`)"
      service: backend
      entryPoints:
        - web
        - websecure
      tls:
        certResolver: letsencrypt
      priority: 100

  services:
    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"

    backend:
      loadBalancer:
        servers:
          - url: "http://backend:8000"

  middlewares:
    security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        contentTypeNosniff: true
        frameDeny: true
        browserXssFilter: true
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:"

    rate-limit:
      rateLimit:
        average: 100
        burst: 50
