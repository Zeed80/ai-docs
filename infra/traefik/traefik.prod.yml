# Traefik static configuration for production.
api:
  dashboard: false

entryPoints:
  web:
    address: ":80"
    # Domain + valid TLS deployment: force every HTTP request to HTTPS.
    # The ACME HTTP-01/TLS-ALPN-01 challenge still works because Traefik handles it
    # on the same entrypoints before this redirect applies.
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: "${TRAEFIK_ACME_EMAIL}"
      storage: /etc/traefik/acme/acme.json
      # tlsChallenge issues certificates on-demand for any domain that connects via HTTPS,
      # without requiring a Host() matcher in routing rules.
      tlsChallenge: {}

log:
  level: INFO

accessLog: {}
