# Traefik static configuration for production.
api:
  dashboard: false

entryPoints:
  web:
    address: ":80"
    # Uncomment the block below to redirect all HTTP to HTTPS once you have a valid domain/cert.
    # Without a domain (IP-only access), leave this commented out so HTTP works directly.
    # http:
    #   redirections:
    #     entryPoint:
    #       to: websecure
    #       scheme: https
  websecure:
    address: ":443"

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: "${TRAEFIK_ACME_EMAIL}"
      storage: /etc/traefik/acme/acme.json
      # tlsChallenge issues certificates on-demand for any domain that connects via HTTPS,
      # without requiring a Host() matcher in routing rules.
      tlsChallenge: {}

log:
  level: INFO

accessLog: {}
