# Traefik static configuration for production.
api:
  dashboard: false

entryPoints:
  web:
    address: ":80"
    # Domain + valid TLS deployment: force every HTTP request to HTTPS.
    # The ACME HTTP-01/TLS-ALPN-01 challenge still works because Traefik handles it
    # on the same entrypoints before this redirect applies.
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      # Traefik does NOT expand ${ENV} in static YAML. The real contact is injected
      # via the env var TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL
      # (set from gitignored infra/.env, see docker-compose.prod.yml), which overrides
      # this placeholder. Keeps the contact email out of the public repo.
      email: "admin@example.com"
      storage: /etc/traefik/acme/acme.json
      # tlsChallenge issues certificates on-demand for any domain that connects via HTTPS,
      # without requiring a Host() matcher in routing rules.
      tlsChallenge: {}

log:
  level: INFO

accessLog: {}
