# Traefik dynamic routing configuration for local development.
#
# Priority ladder (higher = wins when multiple rules match):
#   300  authentik-oauth       — /application/, /if/, /.well-known/, /static/dist/, /static/authentik/, /media/
#   250  authentik-api-v3      — /api/v3/  (Authentik internal API called by browser during login)
#   100  backend-api           — /api
#   100  backend-ws            — /ws
#   100  backend-health        — /health
#     1  frontend              — everything else → Next.js
http:
  routers:
    # ── Frontend ────────────────────────────────────────────────────────────────
    frontend:
      rule: "PathPrefix(`/`)"
      service: frontend
      entryPoints:
        - web
      priority: 1

    # ── Backend ─────────────────────────────────────────────────────────────────
    backend-api:
      rule: "PathPrefix(`/api`)"
      service: backend
      entryPoints:
        - web
      priority: 100

    backend-ws:
      rule: "PathPrefix(`/ws`)"
      service: backend
      entryPoints:
        - web
      priority: 100

    backend-health:
      rule: "Path(`/health`)"
      service: backend
      entryPoints:
        - web
      priority: 100

    # ── Mobile app distribution (public, served by backend StaticFiles) ──────────
    app-download:
      rule: "PathPrefix(`/download`)"
      service: backend
      entryPoints:
        - web
      priority: 110

    # Android App Links file — must outrank authentik-oauth (300) on /.well-known/.
    app-assetlinks:
      rule: "Path(`/.well-known/assetlinks.json`)"
      service: backend
      entryPoints:
        - web
      priority: 310

    # Self-hosted push (ntfy) on a dev subdomain.
    ntfy:
      rule: "Host(`push.localhost`)"
      service: ntfy
      entryPoints:
        - web

    # ── Authentik SSO — browser-facing OAuth/UI paths ─────────────────────────
    # Routes Authentik through port 80 so no separate port (9100) is needed.
    # Authentik reads X-Forwarded-Host from Traefik to build absolute URLs.
    authentik-oauth:
      rule: "PathPrefix(`/application/`) || PathPrefix(`/if/`) || PathPrefix(`/flows/`) || PathPrefix(`/.well-known/`) || PathPrefix(`/static/dist/`) || PathPrefix(`/static/authentik/`) || PathPrefix(`/media/`)"
      service: authentik
      entryPoints:
        - web
      priority: 300
      middlewares:
        - authentik-proxy-headers

    # Authentik's own REST API — called by the browser during the login flow.
    # Must be higher priority than backend-api (100) to avoid being swallowed.
    authentik-api-v3:
      rule: "PathPrefix(`/api/v3/`)"
      service: authentik
      entryPoints:
        - web
      priority: 250
      middlewares:
        - authentik-proxy-headers

    # ── Optional services ────────────────────────────────────────────────────────
    minio-console:
      rule: "Host(`minio.localhost`)"
      service: minio-console
      entryPoints:
        - web

  services:
    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"

    backend:
      loadBalancer:
        servers:
          - url: "http://backend:8000"

    authentik:
      loadBalancer:
        servers:
          - url: "http://authentik-server:9000"

    minio-console:
      loadBalancer:
        servers:
          - url: "http://minio:9001"

    ntfy:
      loadBalancer:
        servers:
          - url: "http://ntfy:80"

  middlewares:
    # Pass canonical host to Authentik so it constructs correct absolute URLs.
    authentik-proxy-headers:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "http"

    security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        contentTypeNosniff: true
        frameDeny: true
        browserXssFilter: true
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:"

    rate-limit:
      rateLimit:
        average: 100
        burst: 50
