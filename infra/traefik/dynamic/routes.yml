# Traefik dynamic routing configuration for local development.
http:
  routers:
    frontend:
      rule: "PathPrefix(`/`)"
      service: frontend
      entryPoints:
        - web
      priority: 1

    backend-api:
      rule: "PathPrefix(`/api`)"
      service: backend
      entryPoints:
        - web
      priority: 100

    backend-ws:
      rule: "PathPrefix(`/ws`)"
      service: backend
      entryPoints:
        - web
      priority: 100

    backend-health:
      rule: "Path(`/health`)"
      service: backend
      entryPoints:
        - web
      priority: 100

    minio-console:
      rule: "Host(`minio.localhost`)"
      service: minio-console
      entryPoints:
        - web

  services:
    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"

    backend:
      loadBalancer:
        servers:
          - url: "http://backend:8000"

    minio-console:
      loadBalancer:
        servers:
          - url: "http://minio:9001"

  middlewares:
    security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        contentTypeNosniff: true
        frameDeny: true
        browserXssFilter: true
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:"

    rate-limit:
      rateLimit:
        average: 100
        burst: 50
