services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    volumes:
      - ../backend:/app
      - ../aiagent:/aiagent
    command: sh -c "alembic upgrade heads && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-exclude 'data/*' --reload-exclude '*.pyc'"
    environment:
      APP_DEBUG: "true"
      APP_LOG_LEVEL: DEBUG
      AIAGENT_ROOT: /aiagent

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    volumes:
      - ../backend:/app
      - ../aiagent:/aiagent:ro
    command: celery -A app.tasks.celery_app worker -l debug -c 2 -Q celery,extraction,ingest,scheduler
    environment:
      AIAGENT_ROOT: /aiagent

  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    volumes:
      - ../backend:/app
      - ../aiagent:/aiagent:ro
    environment:
      AIAGENT_ROOT: /aiagent

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    environment:
      NODE_ENV: development

  # The embedded Ollama container (profile: embedded-ollama) is NOT started
  # by default. The stack expects a system Ollama on the host reachable via
  # OLLAMA_URL=http://host-gateway:11434 (see .env).
  # To use the embedded container instead: docker compose --profile embedded-ollama up
  # GPU passthrough for the embedded container is defined in docker-compose.yml;
  # override it to {} here only when running in CI without GPU hardware.
  ollama:
    deploy:
      resources: {}
    # Host 11434 is often taken by a system Ollama — publish on 11435 for dev access.
    ports:
      - "11435:11434"

  # === Dev-only published ports ===================================================
  # These are appended to the secure base (docker-compose.yml), which publishes only
  # 80/443. They give developers direct access to admin UIs and ML servers.
  # They are intentionally absent from production (make prod / docker-compose.prod.yml).
  llama-server:
    ports:
      - "11436:8080"

  vllm-server:
    ports:
      - "11437:8000"

  authentik-server:
    # Direct access to the Authentik admin UI during development.
    ports:
      - "9100:9000"
      - "9443:9443"

  traefik:
    # Insecure dashboard (traefik.yml has api.insecure: true) — dev only.
    ports:
      - "8080:8080"
