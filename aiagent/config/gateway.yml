agent:
  name: Света
  description: AI-сотрудник производственного предприятия
  language: ru
models:
  reasoning:
    provider: ollama
    model: ${OLLAMA_MODEL_REASONING:-qwen3.5:9b}
    base_url: ${OLLAMA_URL:-http://localhost:11434}
    fallback:
      provider: anthropic
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY:-}
  ocr:
    provider: ollama
    model: ${OLLAMA_MODEL_OCR:-gemma4:e4b}
    base_url: ${OLLAMA_URL:-http://localhost:11434}
backend:
  base_url: ${FASTAPI_URL:-http://localhost:8000}
  timeout: 30
