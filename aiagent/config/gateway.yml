# AiAgent Gateway — AI Manufacturing Workspace
# Agent: Света (Sveta)
# Single source of truth for agent behaviour.
# Edit this file to add/remove skills or approval gates — no server restart needed.

agent:
  name: Света
  description: AI-сотрудник производственного предприятия
  language: ru

# ── AI model routing ──────────────────────────────────────────────────────────
# Reasoning model can be overridden at runtime via /api/ai/config.
models:
  reasoning:
    provider: ollama
    model: ${AGENT_MODEL:-qwen3.5:9b}
    base_url: ${OLLAMA_URL:-http://localhost:11434}
    fallback:
      provider: anthropic
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY:-}
  ocr:
    # Always local — documents are confidential
    provider: ollama
    model: ${OCR_MODEL:-gemma4:e4b}
    base_url: ${OLLAMA_URL:-http://localhost:11434}

# ── Backend connection ────────────────────────────────────────────────────────
backend:
  base_url: ${FASTAPI_URL:-http://localhost:8000}
  timeout: 30

# ── Skills ────────────────────────────────────────────────────────────────────
skills:
  # Auto-generated from FastAPI docstrings — do not edit manually
  registry: ./skills/_registry.yml

  # Whitelist: only these skills are exposed to the agent in chat.
  # To expose a new skill: add its name here.
  # To hide a skill from chat (but keep it for scenarios): remove it.
  exposed:
    # Documents
    - doc.ingest
    - doc.list
    - doc.get
    - doc.search
    - doc.workspace
    - doc.summarize
    - doc.extract
    - doc.classify
    - doc.batch_classify
    - doc.update
    - doc.delete
    - doc.bulk_delete
    - doc.correct_field
    - doc.link
    - doc.link_update
    - doc.link_delete
    - doc.dependencies
    - doc.memory_rebuild
    - doc.batch_memory_rebuild
    - doc.batch_embeddings_reindex
    - doc.batch_ntd_check
    - doc.batch_process
    - doc.management
    # Invoices
    - invoice.list
    - invoice.get
    - invoice.extract
    - invoice.approve
    - invoice.reject
    - invoice.validate
    - invoice.compare_prices
    - invoice.update
    - invoice.delete
    - invoice.bulk_delete
    - invoice.receive
    # Search
    - search.hybrid
    - search.nl_to_query
    - search.nl
    # Graph memory
