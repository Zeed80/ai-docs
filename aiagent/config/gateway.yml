scenarios:
- name: email_triage
  path: ./scenarios/email-triage.yml
  trigger:
    type: schedule
    cron: '*/5 * * * *'
- name: assisted_review
  path: ./scenarios/assisted-review.yml
  trigger:
    type: event
    event: document.review_opened
- name: warehouse_receipt
  path: ./scenarios/warehouse-receipt.yml
  trigger:
    type: event
    event: invoice.approved
- name: low_stock_alert
  path: ./scenarios/low-stock-alert.yml
  trigger:
    type: schedule
    cron: 0 9 * * *
- name: memory_maintenance
  path: ./scenarios/memory-maintenance.yml
  trigger:
    type: schedule
    cron: 30 2 * * *
prompts:
  base: ./prompts/base.md
  roles:
    manager: ./prompts/role-manager.md
    engineer: ./prompts/role-engineer.md
    accountant: ./prompts/role-accountant.md
    buyer: ./prompts/role-buyer.md
channels:
  websocket:
    enabled: true
    path: /ws/chat
    auth: none
auth:
  provider: authentik
  oauth2:
    issuer: ${AUTHENTIK_URL:-http://authentik:9000}/application/o/ai-workspace/
    client_id: ${OAUTH_CLIENT_ID:-}
    client_secret: ${OAUTH_CLIENT_SECRET:-}
logging:
  level: info
  format: json
  audit: true
