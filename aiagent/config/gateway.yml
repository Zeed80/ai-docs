scenarios:
- name: email_triage
  path: ./scenarios/email-triage.yml
  trigger:
    type: schedule
    cron: '*/5 * * * *'
- name: assisted_review
  path: ./scenarios/assisted-review.yml
  trigger:
    type: event
    event: document.review_opened
- name: warehouse_receipt
  path: ./scenarios/warehouse-receipt.yml
  trigger:
    type: event
    event: invoice.approved
- name: low_stock_alert
  path: ./scenarios/low-stock-alert.yml
  trigger:
    type: schedule
    cron: 0 9 * * *
- name: memory_maintenance
  path: ./scenarios/memory-maintenance.yml
  trigger:
    type: schedule
    cron: 30 2 * * *
- name: draft_email
  path: ./scenarios/draft-email.yml
  trigger:
    type: manual
- name: cad_digitize_release
  path: ./scenarios/cad-digitize-release.yml
  trigger:
    type: manual
prompts:
  base: ./prompts/base.md
  # Роли-специалисты. У каждой: prompt (системный промпт роли) и capabilities —
  # allowlist видимых инструментов (core workspace/memory/search доступны всегда).
  # Секретарь больше не worker-роль: он объединён с оркестратором (front-agent).
  roles:
    invoice_specialist:
      prompt: ./prompts/role-invoice-specialist.md
      capabilities: [invoices, documents, suppliers, payments, anomalies, normalization, analytics]
      default_canvases: ["agent:invoices", "agent:invoice-items"]
    data_analyst:
      prompt: ./prompts/role-data-analyst.md
      capabilities: [invoices, documents, suppliers, warehouse, procurement, payments, anomalies, analytics, agent_control]
    warehouse_specialist:
      prompt: ./prompts/role-warehouse.md
      capabilities: [warehouse, documents, procurement, analytics]
    procurement_specialist:
      prompt: ./prompts/role-procurement.md
      capabilities: [procurement, suppliers, invoices, email, documents, analytics]
    accountant:
      prompt: ./prompts/role-accountant.md
      capabilities: [invoices, payments, documents, suppliers, normalization, analytics]
    engineer:
      prompt: ./prompts/role-engineer.md
      capabilities: [documents, tech, analytics, image_studio]
      default_canvases: ["agent:image-studio"]
    technologist:
      prompt: ./prompts/role-technologist.md
      capabilities: [tech, documents, analytics, image_studio]
      default_canvases: ["agent:image-studio"]
    memory_researcher:
      prompt: ./prompts/role-memory-researcher.md
      capabilities: [documents, analytics]
    normcontroller:
      prompt: ./prompts/role-normcontroller.md
      capabilities: [cad_review, documents, analytics]
      default_canvases: ["agent:image-studio"]
channels:
  websocket:
    enabled: true
    path: /ws/chat
    auth: none
auth:
  provider: authentik
  oauth2:
    issuer: ${AUTHENTIK_URL:-http://authentik:9000}/application/o/ai-workspace/
    client_id: ${OAUTH_CLIENT_ID:-}
    client_secret: ${OAUTH_CLIENT_SECRET:-}
logging:
  level: info
  format: json
  audit: true
