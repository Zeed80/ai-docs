      provider: anthropic
      model: claude-sonnet-4-6
      api_key: ${ANTHROPIC_API_KEY:-}
  ocr:
    provider: ollama
    model: ${OLLAMA_MODEL_OCR:-gemma4:e4b}
    base_url: ${OLLAMA_URL:-http://localhost:11434}
